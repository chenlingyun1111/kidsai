name: kidsai_app
description: KidsAI - Children's English learning AI voice chat companion
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Audio
  record: ^5.1.0
  audioplayers: ^6.1.0

  # Animation
  rive: ^0.13.0

  # Local storage
  hive: ^4.0.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0

  # File picker
  file_picker: ^8.1.0

  # Utils
  go_router: ^14.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/rive/
    - assets/images/
    - assets/sounds/
    - assets/fonts/
